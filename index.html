<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahnhofsuhr Optimiert</title>
    <style>
        :root {
            --size: 88vw;
            --black: #222222;
            --red: #cc0000;
            --outline: rgba(255,255,255,0.8);
        }
        @media (min-width: 600px) { :root { --size: 450px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #ececec;
            overflow: hidden; touch-action: none;
        }

        .clock {
            width: var(--size); height: var(--size);
            background: white; border-radius: 50%;
            border: calc(var(--size) * 0.045) solid var(--black);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .mark {
            position: absolute; width: 1.6%; height: 6%;
            background: var(--black); left: 49.2%; top: 1.5%;
            transform-origin: 50% calc(var(--size) / 2 - 1.5%);
        }
        .mark.hour { width: 3.8%; height: 12%; left: 48.1%; }

        .center-axis {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .hand {
            position: absolute; bottom: 0;
            transform-origin: bottom center;
            will-change: transform;
            /* Der Trick gegen das Verschwimmen: Eine feine Lichtkante */
            box-shadow: 0 0 0 0.5px var(--outline);
        }

        /* Stundenzeiger: Kürzer & Kräftiger */
        .hour-hand {
            width: calc(var(--size) * 0.045);
            height: calc(var(--size) * 0.25);
            background: var(--black);
            border-radius: 4px 4px 2px 2px;
            margin-bottom: calc(var(--size) * -0.06);
            transform-origin: center calc(100% - (var(--size) * 0.06));
            z-index: 2;
        }

        /* Minutenzeiger: Länger & Schlanker */
        .minute-hand {
            width: calc(var(--size) * 0.03);
            height: calc(var(--size) * 0.40);
            background: var(--black);
            border-radius: 3px 3px 1px 1px;
            margin-bottom: calc(var(--size) * -0.06);
            transform-origin: center calc(100% - (var(--size) * 0.06));
            z-index: 3;
        }

        /* Sekundenzeiger: Filigraner Kontrast */
        .second-hand {
            width: calc(var(--size) * 0.015);
            height: calc(var(--size) * 0.44);
            background: var(--red);
            margin-bottom: calc(var(--size) * -0.12);
            transform-origin: center calc(100% - (var(--size) * 0.12));
            z-index: 4;
            box-shadow: none; /* Rot braucht keine Outline */
        }

        .second-hand::after {
            content: ''; position: absolute; top: 0; left: 50%;
            width: 450%; aspect-ratio: 1;
            background: var(--red); border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .center-dot {
            width: calc(var(--size) * 0.06);
            height: calc(var(--size) * 0.06);
            background: var(--black);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="clock">
    <div id="marks"></div>
    <div class="center-axis">
        <div class="hand hour-hand" id="h"></div>
        <div class="hand minute-hand" id="m"></div>
        <div class="hand second-hand" id="s"></div>
        <div class="center-dot"></div>
    </div>
</div>

<script>
    const marks = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marks.appendChild(mark);
    }

    const hH = document.getElementById('h'),
          mH = document.getElementById('m'),
          sH = document.getElementById('s');

    function tick() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        hH.style.transform = `translateX(-50%) rotate(${h * 30}deg) translate3d(0,0,0)`;
        mH.style.transform = `translateX(-50%) rotate(${m * 6}deg) translate3d(0,0,0)`;
        sH.style.transform = `translateX(-50%) rotate(${s * 6}deg) translate3d(0,0,0)`;

        requestAnimationFrame(tick);
    }
    tick();
</script>

</body>
</html>
