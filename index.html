<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bahnhofsuhr Mobil Fix</title>
    <style>
        :root {
            /* Wir lassen 5vw Puffer, damit nichts am Rand klebt oder abgeschnitten wird */
            --size: 85vw; 
            --bg-color: #f0f0f0;
        }

        @media (min-width: 600px) {
            :root { --size: 400px; }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: none;
        }

        .clock-container {
            width: var(--size);
            height: var(--size);
            position: relative;
            /* Verhindert Clipping-Fehler in Safari */
            -webkit-transform: translateZ(0); 
            transform: translateZ(0);
        }

        .clock-face {
            width: 100%;
            height: 100%;
            background-color: white;
            border: calc(var(--size) * 0.04) solid #333; /* Dynamischer Rahmen */
            border-radius: 50%;
            position: relative;
        }

        /* Die Striche */
        .mark {
            position: absolute;
            width: 1.5%;
            height: 5%;
            background: #333;
            left: 49.25%;
            top: 1%;
            transform-origin: 50% calc(var(--size) / 2 - 1%);
        }

        .mark.hour {
            width: 2.5%;
            height: 10%;
            left: 48.75%;
        }

        /* Zeiger-Konfiguration */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #333;
            border-radius: 100px;
            /* Hardware-Beschleunigung für flüssiges iPhone-Rendering */
            will-change: transform;
        }

        .hour-hand {
            width: 3.5%;
            height: 28%;
            margin-left: -1.75%;
            z-index: 3;
        }

        .minute-hand {
            width: 2.5%;
            height: 40%;
            margin-left: -1.25%;
            z-index: 4;
        }

        .second-hand {
            width: 1.5%;
            height: 42%;
            margin-left: -0.75%;
            background: #d00;
            z-index: 5;
            border-radius: 0;
        }

        /* Die rote Kelle am Sekundenzeiger */
        .second-hand::after {
            content: '';
            position: absolute;
            top: -12%; /* Relativ zum Zeiger */
            left: 50%;
            width: 400%; /* Macht sie kreisförmig breit */
            aspect-ratio: 1;
            background: #d00;
            border-radius: 50%;
            transform: translateX(-50%);
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4.5%;
            height: 4.5%;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
        }
    </style>
</head>
<body>

<div class="clock-container">
    <div class="clock-face">
        <div id="marks"></div>
        <div class="hand hour-hand" id="hour"></div>
        <div class="hand minute-hand" id="minute"></div>
        <div class="hand second-hand" id="second"></div>
        <div class="center-dot"></div>
    </div>
</div>

<script>
    const marksContainer = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marksContainer.appendChild(mark);
    }

    const hHand = document.getElementById('hour');
    const mHand = document.getElementById('minute');
    const sHand = document.getElementById('second');

    function animate() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        sHand.style.transform = `rotate(${s * 6}deg)`;
        mHand.style.transform = `rotate(${m * 6}deg)`;
        hHand.style.transform = `rotate(${h * 30}deg)`;

        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
