<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bahnhofsuhr iPhone-Fix</title>
    <style>
        :root {
            --clock-size: 82vw; 
            --clock-color: #333;
            --accent-color: #d00;
        }
        @media (min-width: 600px) { :root { --clock-size: 400px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #f4f4f4;
            overflow: hidden; touch-action: none;
        }

        /* Container mit leichtem Padding gegen Grafikfehler am Rand */
        .clock-container {
            width: var(--clock-size); height: var(--clock-size);
            padding: 5px; position: relative;
        }

        .clock-face {
            width: 100%; height: 100%;
            background: white; border-radius: 50%;
            border: calc(var(--clock-size) * 0.04) solid var(--clock-color);
            position: relative;
            /* Verhindert Sub-Pixel-Fehler in Safari */
            -webkit-transform: translateZ(0); transform: translateZ(0);
        }

        .mark {
            position: absolute; width: 1.6%; height: 6%;
            background: var(--clock-color); left: 49.2%; top: 1%;
            transform-origin: 50% calc(var(--clock-size) / 2 - 1%);
        }
        .mark.hour { width: 3%; height: 11%; left: 48.5%; }

        /* Zeiger-Konfiguration mit Hardware-Beschleunigung */
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom center;
            background: var(--clock-color);
            /* Zwingt iOS Safari zum sauberen Rendering */
            -webkit-transform: translate3d(0,0,0);
            transform: translate3d(0,0,0);
            will-change: transform;
            backface-visibility: hidden;
        }

        .hour-hand { width: 3.8%; height: 26%; margin-left: -1.9%; z-index: 2; border-radius: 4px; }
        .minute-hand { width: 2.8%; height: 40%; margin-left: -1.4%; z-index: 3; border-radius: 2px; }
        
        .second-hand {
            width: 1.4%; height: 42%; margin-left: -0.7%;
            background: var(--accent-color); z-index: 4;
        }

        /* Die rote Kelle am Ende */
        .second-hand::after {
            content: ''; position: absolute; top: -14%; left: 50%;
            width: 450%; aspect-ratio: 1;
            background: var(--accent-color); border-radius: 50%;
            transform: translateX(-50%);
            -webkit-transform: translateX(-50%) translateZ(0);
        }

        .center-dot {
            position: absolute; top: 50%; left: 50%;
            width: 4.5%; height: 4.5%; background: var(--clock-color);
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="clock-container">
    <div class="clock-face">
        <div id="marks"></div>
        <div class="hand hour-hand" id="hour"></div>
        <div class="hand minute-hand" id="minute"></div>
        <div class="hand second-hand" id="second"></div>
        <div class="center-dot"></div>
    </div>
</div>

<script>
    const marksContainer = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marksContainer.appendChild(mark);
    }

    const hHand = document.getElementById('hour'), 
          mHand = document.getElementById('minute'), 
          sHand = document.getElementById('second');

    function update() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        sHand.style.transform = `translate3d(-50%, 0, 0) rotate(${s * 6}deg)`;
        mHand.style.transform = `translate3d(-50%, 0, 0) rotate(${m * 6}deg)`;
        hHand.style.transform = `translate3d(-50%, 0, 0) rotate(${h * 30}deg)`;

        requestAnimationFrame(update);
    }
    update();
</script>

</body>
</html>
