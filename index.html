<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahnhofsuhr Orbit Final</title>
    <style>
        :root {
            --size: 85vw;
            --black: #222;
            --orange: #ff8c00;
            --red: #cc0000;
        }
        @media (min-width: 600px) { :root { --size: 450px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #f0f0f0;
            overflow: hidden; font-family: 'Arial Black', sans-serif;
        }

        .clock {
            width: var(--size); height: var(--size);
            background: white; border-radius: 50%;
            border: calc(var(--size) * 0.045) solid var(--black);
            position: relative;
            display: grid; place-items: center;
        }

        .orbit-container {
            position: absolute;
            width: 0; height: 0;
            top: 50%; left: 50%;
            will-change: transform;
            z-index: 5;
        }

        .char {
            position: absolute;
            height: calc(var(--size) * 0.38); 
            bottom: 0; left: 50%;
            transform-origin: bottom center;
            font-size: calc(var(--size) * 0.08);
            color: var(--orange);
            -webkit-text-stroke: 1.5px black;
            font-weight: 900;
            white-space: nowrap;
            text-align: center;
            width: 1em;
            margin-left: -0.5em;
        }

        .mark { position: absolute; width: 1.6%; height: 6%; background: var(--black); left: 49.2%; top: 1.5%; transform-origin: 50% calc(var(--size) / 2 - 1.5%); }
        .mark.hour { width: 3.8%; height: 11%; left: 48.1%; }
        
        .center-axis { position: absolute; width: 0; height: 0; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .hand { position: absolute; bottom: 0; transform-origin: bottom center; will-change: transform; }
        
        .hour-hand { width: calc(var(--size) * 0.045); height: calc(var(--size) * 0.25); background: var(--black); border-radius: 4px; margin-bottom: calc(var(--size) * -0.06); transform-origin: center calc(100% - (var(--size) * 0.06)); z-index: 2; border: 0.5px solid white; }
        .minute-hand { width: calc(var(--size) * 0.03); height: calc(var(--size) * 0.40); background: var(--black); border-radius: 3px; margin-bottom: calc(var(--size) * -0.06); transform-origin: center calc(100% - (var(--size) * 0.06)); z-index: 3; border: 0.5px solid white; }
        
        /* OPTIMIERTER SEKUNDENZEIGER */
        .second-hand { 
            width: calc(var(--size) * 0.015); 
            height: calc(var(--size) * 0.30); /* Länge auf 0.30 erhöht */
            background: var(--red); 
            margin-bottom: calc(var(--size) * -0.08); 
            transform-origin: center calc(100% - (var(--size) * 0.08)); 
            z-index: 4; 
        }
        
        .second-hand::after { content: ''; position: absolute; top: 0; left: 50%; width: 350%; aspect-ratio: 1; background: var(--red); border-radius: 50%; transform: translate(-50%, -50%); }
        .center-dot { width: calc(var(--size) * 0.06); height: calc(var(--size) * 0.06); background: var(--black); border-radius: 50%; z-index: 11; }
    </style>
</head>
<body>

    <div class="clock">
        <div id="marks" style="position: absolute; inset: 0;"></div>
        <div class="orbit-container" id="orbit"></div>
        <div class="center-axis">
            <div class="hand hour-hand" id="h"></div>
            <div class="hand minute-hand" id="m"></div>
            <div class="hand second-hand" id="s"></div>
            <div class="center-dot"></div>
        </div>
    </div>

<script>
    const marks = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marks.appendChild(mark);
    }

    const orbit = document.getElementById('orbit');
    const text = "NESPINKEJ";
    const chars = [];
    const wordSpread = 60; 
    const step = wordSpread / (text.length - 1);

    text.split('').forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = char;
        const charAngle = (i * step) - (wordSpread / 2);
        span.style.transform = `rotate(${charAngle}deg)`;
        orbit.appendChild(span);
        chars.push({element: span, baseAngle: charAngle});
    });

    const hH = document.getElementById('h'), mH = document.getElementById('m'), sH = document.getElementById('s');

    function update(time) {
        const now = new Date(), ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000, m = now.getMinutes() + s / 60, h = (now.getHours() % 12) + m / 60;
        
        hH.style.transform = `translateX(-50%) rotate(${h * 30}deg)`;
        mH.style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
        sH.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;

        const rotation = s * 6; 
        chars.forEach((charObj, i) => {
            const wobbleY = Math.sin((time / 200) + i * 0.8) * 4;
            charObj.element.style.transform = `rotate(${charObj.baseAngle + rotation}deg) translateY(${wobbleY}px)`;
        });

        requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
</script>

</body>
</html>
