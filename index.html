<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahnhofsuhr NESPINKEJ Inside</title>
    <style>
        :root {
            --size: 85vw;
            --black: #222;
            --red: #cc0000;
        }
        @media (min-width: 600px) { :root { --size: 450px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #f0f0f0;
            overflow: hidden; font-family: 'Arial Black', sans-serif;
        }

        .clock {
            width: var(--size); height: var(--size);
            background: white; border-radius: 50%;
            border: calc(var(--size) * 0.045) solid var(--black);
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        /* Container für die Schrift - Exakt in der Mitte der Uhr fixiert */
        .inner-text-container {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            pointer-events: none;
        }

        .char {
            position: absolute;
            /* RADIUS VERKLEINERT: Zieht die Schrift ins weiße Feld hinein */
            height: calc(var(--size) * 0.32); 
            bottom: 0; left: 50%;
            transform-origin: bottom center;
            font-size: calc(var(--size) * 0.08);
            color: var(--red);
            -webkit-text-stroke: 1px black;
            font-weight: 900;
            white-space: nowrap;
            text-align: center;
            width: 1em;
            margin-left: -0.5em;
            will-change: transform;
            z-index: 1; /* Hinter den Zeigern */
        }

        .mark {
            position: absolute; width: 1.6%; height: 6%; background: var(--black);
            left: 49.2%; top: 1.5%; transform-origin: 50% calc(var(--size) / 2 - 1.5%);
        }
        .mark.hour { width: 3.8%; height: 11%; left: 48.1%; }

        .center-axis {
            position: absolute; width: 0; height: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; /* Zeiger IMMER über der Schrift */
        }

        .hand { position: absolute; bottom: 0; transform-origin: bottom center; will-change: transform; border: 0.5px solid white; }
        .hour-hand { width: calc(var(--size) * 0.045); height: calc(var(--size) * 0.25); background: var(--black); border-radius: 4px; margin-bottom: calc(var(--size) * -0.06); transform-origin: center calc(100% - (var(--size) * 0.06)); z-index: 2; }
        .minute-hand { width: calc(var(--size) * 0.03); height: calc(var(--size) * 0.40); background: var(--black); border-radius: 3px; margin-bottom: calc(var(--size) * -0.06); transform-origin: center calc(100% - (var(--size) * 0.06)); z-index: 3; }
        .second-hand { width: calc(var(--size) * 0.015); height: calc(var(--size) * 0.44); background: var(--red); margin-bottom: calc(var(--size) * -0.12); transform-origin: center calc(100% - (var(--size) * 0.12)); z-index: 4; border: none; }
        .second-hand::after { content: ''; position: absolute; top: 0; left: 50%; width: 450%; aspect-ratio: 1; background: var(--red); border-radius: 50%; transform: translate(-50%, -50%); }
        .center-dot { width: calc(var(--size) * 0.06); height: calc(var(--size) * 0.06); background: var(--black); border-radius: 50%; z-index: 11; }
    </style>
</head>
<body>

    <div class="clock">
        <div id="marks" style="position: absolute; inset: 0;"></div>
        
        <!-- Schriftzug Container -->
        <div class="inner-text-container" id="wobbleContainer"></div>
        
        <!-- Zeiger-System -->
        <div class="center-axis">
            <div class="hand hour-hand" id="h"></div>
            <div class="hand minute-hand" id="m"></div>
            <div class="hand second-hand" id="s"></div>
            <div class="center-dot"></div>
        </div>
    </div>

<script>
    const marks = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marks.appendChild(mark);
    }

    const container = document.getElementById('wobbleContainer');
    const text = "NESPINKEJ";
    const chars = [];
    const startAngle = -35; 
    const endAngle = 35;
    const step = (endAngle - startAngle) / (text.length - 1);

    text.split('').forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = char;
        span.dataset.baseAngle = startAngle + (i * step);
        container.appendChild(span);
        chars.push(span);
    });

    const hH = document.getElementById('h'), mH = document.getElementById('m'), sH = document.getElementById('s');

    function update(time) {
        const now = new Date(), ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000, m = now.getMinutes() + s / 60, h = (now.getHours() % 12) + m / 60;
        
        hH.style.transform = `translateX(-50%) rotate(${h * 30}deg)`;
        mH.style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
        sH.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;

        chars.forEach((span, i) => {
            const angle = parseFloat(span.dataset.baseAngle);
            const wobbleY = Math.sin((time / 250) + i * 0.7) * 4; 
            const wobbleR = Math.sin((time / 400) + i * 0.5) * 2; 
            
            span.style.transform = `translateX(-50%) rotate(${angle + wobbleR}deg) translateY(${wobbleY}px)`;
        });

        requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
</script>

</body>
</html>
