<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahnhofsuhr Fix</title>
    <style>
        :root {
            --size: 85vw;
            --black: #282828;
            --red: #d00;
        }
        @media (min-width: 600px) { :root { --size: 450px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #f0f0f0;
            overflow: hidden; touch-action: none;
        }

        .clock {
            width: var(--size); height: var(--size);
            background: white; border-radius: 50%;
            border: calc(var(--size) * 0.04) solid var(--black);
            position: relative;
        }

        /* Skala */
        .mark {
            position: absolute; width: 1.5%; height: 6%;
            background: var(--black); left: 49.25%; top: 1.5%;
            transform-origin: 50% calc(var(--size) / 2 - 1.5%);
        }
        .mark.hour { width: 3.5%; height: 11%; left: 48.25%; }

        /* DER FIX: Eine zentrale Achse für ALLES */
        .center-axis {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .hand {
            position: absolute;
            bottom: 0; /* Zeiger beginnt an der Achse */
            transform-origin: bottom center;
            will-change: transform;
            -webkit-backface-visibility: hidden;
        }

        /* Stundenzeiger */
        .hour-hand {
            width: calc(var(--size) * 0.04);
            height: calc(var(--size) * 0.28);
            background: var(--black);
            border-radius: 2px;
            /* margin-bottom bestimmt den Überstand nach unten */
            margin-bottom: calc(var(--size) * -0.06);
            transform-origin: center calc(100% - (var(--size) * 0.06));
        }

        /* Minutenzeiger */
        .minute-hand {
            width: calc(var(--size) * 0.028);
            height: calc(var(--size) * 0.42);
            background: var(--black);
            border-radius: 2px;
            margin-bottom: calc(var(--size) * -0.06);
            transform-origin: center calc(100% - (var(--size) * 0.06));
        }

        /* Sekundenzeiger */
        .second-hand {
            width: calc(var(--size) * 0.015);
            height: calc(var(--size) * 0.45);
            background: var(--red);
            margin-bottom: calc(var(--size) * -0.1);
            transform-origin: center calc(100% - (var(--size) * 0.1));
        }

        /* Rote Kelle */
        .second-hand::after {
            content: ''; position: absolute; top: 0; left: 50%;
            width: 450%; aspect-ratio: 1;
            background: var(--red); border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .center-dot {
            width: calc(var(--size) * 0.05);
            height: calc(var(--size) * 0.05);
            background: var(--black);
            border-radius: 50%;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="clock">
    <div id="marks"></div>
    
    <div class="center-axis">
        <div class="hand hour-hand" id="h"></div>
        <div class="hand minute-hand" id="m"></div>
        <div class="hand second-hand" id="s"></div>
        <div class="center-dot"></div>
    </div>
</div>

<script>
    const marks = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marks.appendChild(mark);
    }

    const hH = document.getElementById('h'),
          mH = document.getElementById('m'),
          sH = document.getElementById('s');

    function tick() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        // Nutzt translate3d für GPU-Power und stabilere Pixel-Positionierung
        hH.style.transform = `translateX(-50%) rotate(${h * 30}deg) translate3d(0,0,0)`;
        mH.style.transform = `translateX(-50%) rotate(${m * 6}deg) translate3d(0,0,0)`;
        sH.style.transform = `translateX(-50%) rotate(${s * 6}deg) translate3d(0,0,0)`;

        requestAnimationFrame(tick);
    }
    tick();
</script>

</body>
</html>
