<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bahnhofsuhr Final</title>
    <style>
        :root {
            --clock-size: 85vw;
            --clock-color: #282828;
            --accent-color: #d00;
        }
        @media (min-width: 600px) { :root { --clock-size: 450px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #f0f0f0;
            overflow: hidden; touch-action: none;
        }

        .clock-face {
            width: var(--clock-size); height: var(--clock-size);
            background: white; border-radius: 50%;
            border: calc(var(--clock-size) * 0.04) solid var(--clock-color);
            position: relative; box-sizing: border-box;
        }

        /* Skala */
        .mark {
            position: absolute; width: 1.5%; height: 5.5%;
            background: var(--clock-color); left: 49.25%; top: 1.5%;
            transform-origin: 50% calc(var(--clock-size) / 2 - 1.5%);
        }
        .mark.hour { width: 3.5%; height: 11%; left: 48.25%; }

        /* Zentrale Achse für alle Zeiger */
        .hand-axis {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
        }

        .hand {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            background: var(--clock-color);
            /* Transform-Origin ist jetzt exakt die Mitte der Uhr */
            transform-origin: 50% 100%;
            will-change: transform;
            border-radius: 2px;
        }

        /* Stundenzeiger: massiv, ragt leicht über Achse hinaus */
        .hour-hand {
            width: calc(var(--clock-size) * 0.04);
            height: calc(var(--clock-size) * 0.28);
            margin-bottom: calc(var(--clock-size) * -0.05); /* Überstand nach unten */
            transform-origin: 50% calc(100% - 0.05 * var(--clock-size));
            z-index: 2;
        }

        /* Minutenzeiger: länger, schmaler */
        .minute-hand {
            width: calc(var(--clock-size) * 0.028);
            height: calc(var(--clock-size) * 0.42);
            margin-bottom: calc(var(--clock-size) * -0.05);
            transform-origin: 50% calc(100% - 0.05 * var(--clock-size));
            z-index: 3;
        }

        /* Sekundenzeiger: Filigran mit Kelle */
        .second-hand {
            width: calc(var(--clock-size) * 0.015);
            height: calc(var(--clock-size) * 0.45);
            background: var(--accent-color);
            margin-bottom: calc(var(--clock-size) * -0.08); /* Längerer Überstand hinten */
            transform-origin: 50% calc(100% - 0.08 * var(--clock-size));
            z-index: 4;
            border-radius: 0;
        }

        .second-hand::after {
            content: ''; position: absolute; top: 0; left: 50%;
            width: 450%; aspect-ratio: 1;
            background: var(--accent-color); border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .center-dot {
            position: absolute; top: 50%; left: 50%;
            width: 5%; height: 5%; background: var(--clock-color);
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="clock-face">
    <div id="marks"></div>
    <div class="hand-axis">
        <div class="hand hour-hand" id="hour"></div>
        <div class="hand minute-hand" id="minute"></div>
        <div class="hand second-hand" id="second"></div>
    </div>
    <div class="center-dot"></div>
</div>

<script>
    const marksContainer = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marksContainer.appendChild(mark);
    }

    const hHand = document.getElementById('hour'), 
          mHand = document.getElementById('minute'), 
          sHand = document.getElementById('second');

    function update() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        // Nutzt translate3d für perfekte iPhone-Performance ohne Grafikfehler
        sHand.style.transform = `translateX(-50%) rotate(${s * 6}deg) translate3d(0,0,0)`;
        mHand.style.transform = `translateX(-50%) rotate(${m * 6}deg) translate3d(0,0,0)`;
        hHand.style.transform = `translateX(-50%) rotate(${h * 30}deg) translate3d(0,0,0)`;

        requestAnimationFrame(update);
    }
    update();
</script>

</body>
</html>
