<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bahnhofsuhr Präzision</title>
    <style>
        :root {
            --clock-size: 88vw;
            --clock-color: #282828;
            --accent-color: #d00;
        }
        @media (min-width: 600px) { :root { --clock-size: 450px; } }

        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #f0f0f0;
            overflow: hidden; touch-action: none;
        }

        /* Die Uhr selbst */
        .clock {
            width: var(--clock-size);
            height: var(--clock-size);
            background: white;
            border-radius: 50%;
            border: calc(var(--clock-size) * 0.04) solid var(--clock-color);
            position: relative;
            box-sizing: border-box;
        }

        /* Markierungen */
        .mark-container {
            position: absolute; width: 100%; height: 100%;
        }
        .mark {
            position: absolute; width: 1.6%; height: 6%;
            background: var(--clock-color); left: 49.2%; top: 1.5%;
            transform-origin: 50% calc(var(--clock-size) / 2 - 1.5%);
        }
        .mark.hour { width: 3.5%; height: 11%; left: 48.25%; }

        /* Zeiger-System: Jeder Zeiger-Container füllt die GANZE Uhr aus */
        .hand-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        /* Die eigentlichen Zeiger-Balken */
        .hand-part {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: var(--clock-color);
            border-radius: 2px;
        }

        /* Stundenzeiger */
        .hour-hand .hand-part {
            width: 4%; height: 30%;
            top: 25%; /* Positioniert den Zeiger im oberen Bereich */
        }
        /* Kleiner Überstand nach unten für die Optik */
        .hour-hand::after {
            content: ''; position: absolute; left: 50%; top: 50%;
            width: 4%; height: 6%; background: var(--clock-color);
            transform: translateX(-50%);
        }

        /* Minutenzeiger */
        .minute-hand .hand-part {
            width: 2.8%; height: 42%;
            top: 10%;
        }
        .minute-hand::after {
            content: ''; position: absolute; left: 50%; top: 50%;
            width: 2.8%; height: 6%; background: var(--clock-color);
            transform: translateX(-50%);
        }

        /* Sekundenzeiger */
        .second-hand .hand-part {
            width: 1.5%; height: 45%;
            top: 8%; background: var(--accent-color);
        }
        /* Die rote Kelle */
        .second-hand .hand-part::before {
            content: ''; position: absolute; top: 0; left: 50%;
            width: 400%; aspect-ratio: 1;
            background: var(--accent-color); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        /* Überstand Sekundenzeiger nach unten */
        .second-hand::after {
            content: ''; position: absolute; left: 50%; top: 50%;
            width: 1.5%; height: 10%; background: var(--accent-color);
            transform: translateX(-50%);
        }

        .center-dot {
            position: absolute; top: 50%; left: 50%;
            width: 5%; height: 5%; background: var(--clock-color);
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="clock">
    <div id="marks" class="mark-container"></div>
    
    <div class="hand-container hour-hand" id="hour-c">
        <div class="hand-part"></div>
    </div>
    
    <div class="hand-container minute-hand" id="minute-c">
        <div class="hand-part"></div>
    </div>
    
    <div class="hand-container second-hand" id="second-c">
        <div class="hand-part"></div>
    </div>

    <div class="center-dot"></div>
</div>

<script>
    // Markierungen generieren
    const marksContainer = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marksContainer.appendChild(mark);
    }

    const hC = document.getElementById('hour-c');
    const mC = document.getElementById('minute-c');
    const sC = document.getElementById('second-c');

    function update() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        // Wir rotieren den Container, der exakt so groß ist wie die Uhr
        // Der Drehpunkt ist somit automatisch die exakte Mitte (50% 50%)
        hC.style.transform = `rotate(${h * 30}deg)`;
        mC.style.transform = `rotate(${m * 6}deg)`;
        sC.style.transform = `rotate(${s * 6}deg)`;

        requestAnimationFrame(update);
    }
    update();
</script>

</body>
</html>
