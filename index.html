<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahnhofsuhr Mobil</title>
    <style>
        :root {
            --clock-size: 85vw; /* Standardgröße für Mobilgeräte */
            --clock-border: 3.5vw;
        }

        /* Auf größeren Bildschirmen die Uhr begrenzen */
        @media (min-width: 600px) {
            :root {
                --clock-size: 400px;
                --clock-border: 15px;
            }
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden; /* Verhindert Scrollen auf Mobilgeräten */
            touch-action: none;
        }

        .clock {
            width: var(--clock-size);
            height: var(--clock-size);
            background-color: white;
            border: var(--clock-border) solid #333;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Markierungen */
        .marks {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        .mark {
            position: absolute;
            width: 1%;
            height: 5%;
            background: #333;
            left: 49.5%;
            top: 0;
            transform-origin: 50% calc(var(--clock-size) / 2);
        }

        .mark.hour {
            width: 2%;
            height: 9%;
        }

        /* Zeiger-Basis */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #333;
            border-radius: 10px;
        }

        .hour-hand {
            width: 3%;
            height: 25%;
            margin-left: -1.5%;
            z-index: 3;
        }

        .minute-hand {
            width: 2%;
            height: 38%;
            margin-left: -1%;
            z-index: 4;
        }

        .second-hand {
            width: 1%;
            height: 42%;
            margin-left: -0.5%;
            background: #d00;
            z-index: 5;
            border-radius: 0;
        }

        /* Rote Kelle */
        .second-hand::after {
            content: '';
            position: absolute;
            top: -4.5vw;
            left: -2.25vw;
            width: 5.5vw;
            height: 5.5vw;
            background: #d00;
            border-radius: 50%;
        }

        /* Desktop-Anpassung der Kelle */
        @media (min-width: 600px) {
            .second-hand::after {
                top: -20px;
                left: -10px;
                width: 24px;
                height: 24px;
            }
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4%;
            height: 4%;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="marks" id="marks"></div>
    <div class="hand hour-hand" id="hour"></div>
    <div class="hand minute-hand" id="minute"></div>
    <div class="hand second-hand" id="second"></div>
    <div class="center-dot"></div>
</div>

<script>
    const marksContainer = document.getElementById('marks');
    for (let i = 0; i < 60; i++) {
        const mark = document.createElement('div');
        mark.className = i % 5 === 0 ? 'mark hour' : 'mark';
        mark.style.transform = `rotate(${i * 6}deg)`;
        marksContainer.appendChild(mark);
    }

    const hourHand = document.getElementById('hour');
    const minuteHand = document.getElementById('minute');
    const secondHand = document.getElementById('second');

    function updateClock() {
        const now = new Date();
        const ms = now.getMilliseconds();
        const seconds = now.getSeconds() + ms / 1000;
        const minutes = now.getMinutes() + seconds / 60;
        const hours = (now.getHours() % 12) + minutes / 60;

        secondHand.style.transform = `rotate(${seconds * 6}deg)`;
        minuteHand.style.transform = `rotate(${minutes * 6}deg)`;
        hourHand.style.transform = `rotate(${hours * 30}deg)`;

        requestAnimationFrame(updateClock);
    }

    updateClock();
</script>

</body>
</html>
